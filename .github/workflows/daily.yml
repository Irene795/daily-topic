name: Daily Topic Report

on:
  schedule:
    # 每天 UTC 02:00 运行（北京时间 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch: # 支持手动触发测试

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  daily-topic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: node daily-topic.js

      - name: Commit report
        run: |
          git config --local user.email "459983872@qq.com"
          git config --local user.name "Irene795"
          git add reports/
          git diff --quiet && git diff --staged --quiet || git commit -m "更新选题报告 - $(date +'%Y-%m-%d')"
          git push

  # 保持仓库活跃，防止 GitHub 停止定时任务
  keep-alive:
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Keep repository active
        run: echo "Keep alive ping at $(date)"